<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>加入我们 - 小破站</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* 样式保持不变，省略重复... 和之前一样 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }
        :root {
            --bg-body: #f5f9ff;
            --surface-white: #ffffff;
            --border-light: #e2ebf3;
            --text-primary: #1a2f3f;
            --text-secondary: #426a87;
            --accent-blue: #1f6e9c;
            --accent-soft: #eef3fc;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 8px rgba(0, 0, 0, 0.02);
            --footer-color: #7d99b0;
        }
        body.dark-mode {
            --bg-body: #121826;
            --surface-white: #1e2538;
            --border-light: #2a3349;
            --text-primary: #eef2ff;
            --text-secondary: #9bb4d0;
            --accent-blue: #4d9bcb;
            --accent-soft: #232b3f;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            --footer-color: #6c7f9e;
        }
        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-light);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: default;
            background: transparent;
            border: none;
            padding: 0;
        }
        .logo-icon {
            background: var(--accent-blue);
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }
        .logo-text {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
            background: linear-gradient(130deg, var(--accent-blue), #1a4f72);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .dark-toggle {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: 0.45rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            background-color: var(--surface-white);
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem 2rem;
            flex: 1;
        }
        .join-card {
            background: var(--surface-white);
            border-radius: 28px;
            padding: 2rem 2rem 2.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
            text-align: center;
            max-width: 700px;
            margin: 1rem auto;
        }
        .join-icon { font-size: 4rem; margin-bottom: 1rem; }
        .join-title { font-size: 2rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 1rem; }
        .join-desc { color: var(--text-secondary); font-size: 1rem; margin-bottom: 2rem; line-height: 1.6; }
        .info-list {
            text-align: left;
            background: var(--bg-body);
            border-radius: 24px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 1rem;
            flex-wrap: wrap;
        }
        .info-item:last-child { border-bottom: none; }
        .info-icon { font-size: 1.3rem; min-width: 40px; }
        .info-label { font-weight: 600; color: var(--accent-blue); min-width: 70px; }
        .info-value { color: var(--text-primary); word-break: break-all; flex: 1; }
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
        .btn-home {
            background: var(--accent-blue);
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-home:hover { filter: brightness(1.08); transform: scale(0.98); }
        .btn-copy, .btn-github {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            background-color: var(--surface-white);
        }
        .btn-copy:hover, .btn-github:hover { background-color: var(--accent-soft); border-color: var(--accent-blue); }
        .footer-note { margin-top: 2rem; font-size: 0.7rem; color: var(--footer-color); text-align: center; }
        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .join-card { padding: 1.5rem; }
            .join-title { font-size: 1.6rem; }
            .info-item { flex-direction: column; align-items: flex-start; gap: 6px; }
            .btn-copy, .btn-github { padding: 0.4rem 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div class="logo-area">
                <div class="logo-icon">✕</div>
                <div class="logo-text">Xero / 小破站</div>
            </div>
            <div class="nav-links">
                <button class="dark-toggle" id="darkModeToggle">🌙 深色模式</button>
            </div>
        </div>
        <div class="join-card">
            <div class="join-icon">🤝✨</div>
            <div class="join-title">加入我们</div>
            <div class="join-desc">
                如果你热爱 MC 技术、前端开发、网络安全，<br>
                欢迎联系站长，一同建设小破站！
            </div>
            <div class="info-list">
                <div class="info-item">
                    <span class="info-icon">👨‍💻</span>
                    <span class="info-label">站长</span>
                    <span class="info-value">Xero（全栈开发 · 服务器主理）</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">💬</span>
                    <span class="info-label">QQ</span>
                    <span class="info-value" id="qqValue">2964205460</span>
                    <button class="btn-copy" id="copyQQBtn" style="padding: 0.3rem 1rem; font-size: 0.75rem;">复制</button>
                </div>
                <div class="info-item">
                    <span class="info-icon">📧</span>
                    <span class="info-label">邮箱</span>
                    <span class="info-value" id="emailValue">2964205460@qq.com</span>
                    <button class="btn-copy" id="copyEmailBtn" style="padding: 0.3rem 1rem; font-size: 0.75rem;">复制</button>
                </div>
                <div class="info-item">
                    <span class="info-icon">🐙</span>
                    <span class="info-label">GitHub</span>
                    <span class="info-value" style="flex: 1;">小破站项目仓库</span>
                    <button class="btn-github" id="githubBtn" style="padding: 0.3rem 1rem; font-size: 0.75rem;">🚀 访问仓库</button>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-home" id="backHomeBtn">🏠 返回主页</button>
            </div>
            <div class="footer-note">
                期待你的加入，一起让创意在网页上闪耀 ✨
            </div>
        </div>
    </div>
    <script>
        (function() {
            const darkToggle = document.getElementById('darkModeToggle');
            if (localStorage.getItem('xeroDarkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
                darkToggle.innerHTML = '☀️ 浅色模式';
            } else {
                darkToggle.innerHTML = '🌙 深色模式';
            }
            darkToggle.onclick = () => {
                const isDark = document.body.classList.toggle('dark-mode');
                darkToggle.innerHTML = isDark ? '☀️ 浅色模式' : '🌙 深色模式';
                localStorage.setItem('xeroDarkMode', isDark ? 'enabled' : 'disabled');
            };

            // 返回主页 - 普通跳转，不重新触发协议
            const backHomeBtn = document.getElementById('backHomeBtn');
            function goHome() {
                window.location.href = 'index.html';
            }
            if (backHomeBtn) backHomeBtn.addEventListener('click', goHome);

            // 复制功能
            const qqValue = document.getElementById('qqValue')?.innerText;
            const copyQQ = document.getElementById('copyQQBtn');
            const emailValue = document.getElementById('emailValue')?.innerText;
            const copyEmail = document.getElementById('copyEmailBtn');

            async function copyTextToClipboard(text, btnElement, successMsg = '✅ 已复制') {
                if (!text) return;
                try {
                    await navigator.clipboard.writeText(text);
                    const originalText = btnElement.innerText;
                    btnElement.innerText = successMsg;
                    setTimeout(() => { btnElement.innerText = originalText; }, 1500);
                } catch (err) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    const originalText = btnElement.innerText;
                    btnElement.innerText = '📋 已复制';
                    setTimeout(() => { btnElement.innerText = originalText; }, 1500);
                }
            }

            if (copyQQ && qqValue) copyQQ.addEventListener('click', () => copyTextToClipboard(qqValue, copyQQ, '✅ 复制'));
            if (copyEmail && emailValue) copyEmail.addEventListener('click', () => copyTextToClipboard(emailValue, copyEmail, '✅ 复制'));

            const githubBtn = document.getElementById('githubBtn');
            if (githubBtn) {
                githubBtn.addEventListener('click', () => {
                    window.open('https://github.com/gzs123456/small-web', '_blank');
                });
            }
        })();
    </script>
</body>
</html>
