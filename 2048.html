<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        /* 浅色模式（默认） */
        :root {
            --bg-body: #f5f5f5;
            --text-primary: #333;
            --score-bg: #e0e0e0;
            --score-text: #333;
            --game-bg: #e8e8e8;
            --btn-bg: #333;
            --btn-hover: #555;
            --instruction-color: #888;
            --overlay-bg: rgba(245, 245, 245, 0.85);
            --overlay-title: #333;
            --overlay-text: #666;
        }
        
        /* 深色模式 - 跟随小破站 */
        body.dark {
            --bg-body: #121826;
            --text-primary: #eef2ff;
            --score-bg: #232b3f;
            --score-text: #eef2ff;
            --game-bg: #2a3349;
            --btn-bg: #4d9bcb;
            --btn-hover: #5fad84;
            --instruction-color: #6c7f9e;
            --overlay-bg: rgba(30, 37, 56, 0.9);
            --overlay-title: #eef2ff;
            --overlay-text: #9bb4d0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: none;
            transition: background 0.2s ease;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 48px;
            color: var(--text-primary);
            font-weight: bold;
            margin-bottom: 10px;
            transition: color 0.2s ease;
        }
        
        .score-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .score-box {
            background: var(--score-bg);
            padding: 8px 20px;
            border-radius: 6px;
            color: var(--score-text);
            text-align: center;
            transition: background 0.2s ease, color 0.2s ease;
        }
        
        .score-box span {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.6;
        }
        
        .score-box strong {
            font-size: 20px;
            font-weight: bold;
        }
        
        .game-container {
            position: relative;
            width: 340px;
            height: 340px;
            background: var(--game-bg);
            border-radius: 8px;
            padding: 8px;
            transition: background 0.2s ease;
        }
        
        .tile-container {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            z-index: 2;
        }
        
        .tile {
            position: absolute;
            width: 74px;
            height: 74px;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            transition: transform 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 10;
            pointer-events: none;
        }
        
        .tile.new {
            animation: fadeIn 0.2s ease-out;
        }
        
        .tile.merged {
            animation: fadeIn 0.15s ease-out;
        }
        
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        /* 方块颜色 - 与原版完全一致 */
        .tile-2 { background: #d4d4d4; color: #555; }
        .tile-4 { background: #c4c4c4; color: #555; }
        .tile-8 { background: #a8a8a8; color: #fff; }
        .tile-16 { background: #909090; color: #fff; }
        .tile-32 { background: #787878; color: #fff; }
        .tile-64 { background: #606060; color: #fff; }
        .tile-128 { background: #505050; color: #fff; font-size: 24px; }
        .tile-256 { background: #404040; color: #fff; font-size: 24px; }
        .tile-512 { background: #303030; color: #fff; font-size: 24px; }
        .tile-1024 { background: #252525; color: #fff; font-size: 20px; }
        .tile-2048 { background: #1a1a1a; color: #fff; font-size: 20px; }
        .tile-super { background: #0a0a0a; color: #fff; font-size: 18px; }
        
        .instructions {
            margin-top: 20px;
            color: var(--instruction-color);
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
            transition: color 0.2s ease;
        }
        
        /* 游戏结束覆盖层 */
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
            border-radius: 8px;
        }
        
        .game-over.show {
            opacity: 1;
            visibility: visible;
        }
        
        .game-over h2 {
            font-size: 48px;
            color: var(--overlay-title);
            margin-bottom: 20px;
        }
        
        .game-over p {
            font-size: 18px;
            color: var(--overlay-text);
            margin-bottom: 20px;
        }
        
        .game-over .btn {
            background: var(--btn-bg);
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .game-over .btn:hover {
            background: var(--btn-hover);
        }
        
        @media (max-width: 400px) {
            .game-container {
                width: 300px;
                height: 300px;
                padding: 6px;
            }
            .tile {
                width: 66px;
                height: 66px;
                font-size: 24px;
            }
            .tile-128, .tile-256, .tile-512 { font-size: 20px; }
            .tile-1024, .tile-2048 { font-size: 16px; }
            .tile-super { font-size: 14px; }
            h1 { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-box">
                <span>得分</span>
                <strong id="score">0</strong>
            </div>
        </div>
    </div>
    
    <div class="game-container" id="gameContainer">
        <div class="tile-container" id="tileContainer"></div>
        <div class="game-over" id="gameOver">
            <h2 id="gameOverTitle">游戏结束</h2>
            <p id="gameOverText">再试一次吧！</p>
            <button class="btn" id="restartBtn">再玩一次</button>
        </div>
    </div>
    
    <div class="instructions">
        <span>⬅️ ➡️ ⬆️ ⬇️</span> 或滑动屏幕合并数字
    </div>

    <script>
        // 深色模式同步（跟随小破站主站）
        (function() {
            if (localStorage.getItem('xeroDarkMode') === 'enabled') {
                document.body.classList.add('dark');
            }
            
            window.addEventListener('storage', function(e) {
                if (e.key === 'xeroDarkMode') {
                    if (e.newValue === 'enabled') {
                        document.body.classList.add('dark');
                    } else {
                        document.body.classList.remove('dark');
                    }
                }
            });
            
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'darkModeChanged') {
                    if (e.data.isDark) {
                        document.body.classList.add('dark');
                    } else {
                        document.body.classList.remove('dark');
                    }
                    localStorage.setItem('xeroDarkMode', e.data.isDark ? 'enabled' : 'disabled');
                }
            });
        })();
        
        const gridSize = 4;
        const cellSize = window.innerWidth <= 400 ? 66 : 74;
        const gap = window.innerWidth <= 400 ? 6 : 8;
        
        let board = [];
        let score = 0;
        let isAnimating = false;
        let startX, startY;
        let isDragging = false;
        
        function init() {
            newGame();
            setupInput();
            document.getElementById('restartBtn').onclick = () => newGame();
        }
        
        function newGame() {
            board = Array(gridSize).fill(null).map(() => Array(gridSize).fill(0));
            score = 0;
            updateScore();
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('tileContainer').innerHTML = '';
            
            addRandomTile();
            addRandomTile();
            renderBoard();
        }
        
        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] === 0) {
                        emptyCells.push({r, c});
                    }
                }
            }
            
            if (emptyCells.length > 0) {
                const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
                return {r, c, value: board[r][c]};
            }
            return null;
        }
        
        function renderBoard() {
            const container = document.getElementById('tileContainer');
            container.innerHTML = '';
            
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] !== 0) {
                        createTile(r, c, board[r][c]);
                    }
                }
            }
        }
        
        function createTile(row, col, value, isNew = false, isMerged = false) {
            const tile = document.createElement('div');
            tile.className = `tile tile-${value <= 2048 ? value : 'super'}`;
            if (isNew) tile.classList.add('new');
            if (isMerged) tile.classList.add('merged');
            tile.textContent = value;
            tile.style.transform = `translate(${col * (cellSize + gap)}px, ${row * (cellSize + gap)}px)`;
            document.getElementById('tileContainer').appendChild(tile);
            return tile;
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        function setupInput() {
            const container = document.getElementById('gameContainer');
            
            container.addEventListener('touchstart', handleTouchStart, {passive: false});
            container.addEventListener('touchmove', handleTouchMove, {passive: false});
            container.addEventListener('touchend', handleTouchEnd, {passive: false});
            
            container.addEventListener('mousedown', handleMouseDown);
            container.addEventListener('mousemove', handleMouseMove);
            container.addEventListener('mouseup', handleMouseUp);
            container.addEventListener('mouseleave', handleMouseUp);
            
            document.addEventListener('keydown', handleKeyDown);
        }
        
        const SWIPE_THRESHOLD = 30;
        const SWIPE_TIME_LIMIT = 300;
        let touchStartTime = 0;
        let lastTouchX = 0, lastTouchY = 0;
        let velocityX = 0, velocityY = 0;
        
        function handleTouchStart(e) {
            if (isAnimating) return;
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            lastTouchX = startX;
            lastTouchY = startY;
            touchStartTime = Date.now();
            velocityX = velocityY = 0;
            isDragging = true;
        }
        
        function handleTouchMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            velocityX = touch.clientX - lastTouchX;
            velocityY = touch.clientY - lastTouchY;
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
        }
        
        function handleTouchEnd(e) {
            if (!isDragging || isAnimating) return;
            isDragging = false;
            
            const touch = e.changedTouches[0];
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            const dt = Date.now() - touchStartTime;
            
            const isQuickSwipe = dt < SWIPE_TIME_LIMIT;
            const velocityThreshold = 3;
            let direction = null;
            
            if (isQuickSwipe && (Math.abs(velocityX) > velocityThreshold || Math.abs(velocityY) > velocityThreshold)) {
                if (Math.abs(velocityX) > Math.abs(velocityY)) {
                    direction = velocityX > 0 ? 'right' : 'left';
                } else {
                    direction = velocityY > 0 ? 'down' : 'up';
                }
            } else if (Math.abs(dx) > SWIPE_THRESHOLD || Math.abs(dy) > SWIPE_THRESHOLD) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    direction = dx > 0 ? 'right' : 'left';
                } else {
                    direction = dy > 0 ? 'down' : 'up';
                }
            }
            
            if (direction) move(direction);
        }
        
        let mouseStartTime = 0;
        let lastMouseX = 0, lastMouseY = 0;
        let mouseVelocityX = 0, mouseVelocityY = 0;
        
        function handleMouseDown(e) {
            if (isAnimating) return;
            e.preventDefault();
            startX = e.clientX;
            startY = e.clientY;
            lastMouseX = startX;
            lastMouseY = startY;
            mouseStartTime = Date.now();
            mouseVelocityX = mouseVelocityY = 0;
            isDragging = true;
        }
        
        function handleMouseMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            mouseVelocityX = e.clientX - lastMouseX;
            mouseVelocityY = e.clientY - lastMouseY;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }
        
        function handleMouseUp(e) {
            if (!isDragging || isAnimating) return;
            isDragging = false;
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            const dt = Date.now() - mouseStartTime;
            
            const isQuickSwipe = dt < SWIPE_TIME_LIMIT;
            const velocityThreshold = 3;
            let direction = null;
            
            if (isQuickSwipe && (Math.abs(mouseVelocityX) > velocityThreshold || Math.abs(mouseVelocityY) > velocityThreshold)) {
                if (Math.abs(mouseVelocityX) > Math.abs(mouseVelocityY)) {
                    direction = mouseVelocityX > 0 ? 'right' : 'left';
                } else {
                    direction = mouseVelocityY > 0 ? 'down' : 'up';
                }
            } else if (Math.abs(dx) > SWIPE_THRESHOLD || Math.abs(dy) > SWIPE_THRESHOLD) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    direction = dx > 0 ? 'right' : 'left';
                } else {
                    direction = dy > 0 ? 'down' : 'up';
                }
            }
            
            if (direction) move(direction);
        }
        
        function handleKeyDown(e) {
            if (isAnimating) return;
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': e.preventDefault(); move('up'); break;
                case 'ArrowDown': case 's': case 'S': e.preventDefault(); move('down'); break;
                case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); move('left'); break;
                case 'ArrowRight': case 'd': case 'D': e.preventDefault(); move('right'); break;
            }
        }
        
        function move(direction) {
            if (isAnimating) return;
            
            const oldBoard = board.map(row => [...row]);
            let moved = false;
            const mergedPositions = [];
            
            if (direction === 'left') {
                for (let r = 0; r < gridSize; r++) {
                    const result = slideLeft(board[r]);
                    if (result.moved) moved = true;
                    board[r] = result.line;
                    result.merged.forEach(c => mergedPositions.push({r, c}));
                }
            } else if (direction === 'right') {
                for (let r = 0; r < gridSize; r++) {
                    const result = slideRight(board[r]);
                    if (result.moved) moved = true;
                    board[r] = result.line;
                    result.merged.forEach(c => mergedPositions.push({r, c}));
                }
            } else if (direction === 'up') {
                for (let c = 0; c < gridSize; c++) {
                    const column = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    const result = slideLeft(column);
                    if (result.moved) moved = true;
                    for (let r = 0; r < gridSize; r++) board[r][c] = result.line[r];
                    result.merged.forEach(r => mergedPositions.push({r, c}));
                }
            } else if (direction === 'down') {
                for (let c = 0; c < gridSize; c++) {
                    const column = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    const result = slideRight(column);
                    if (result.moved) moved = true;
                    for (let r = 0; r < gridSize; r++) board[r][c] = result.line[r];
                    result.merged.forEach(r => mergedPositions.push({r: gridSize - 1 - r, c}));
                }
            }
            
            if (!moved) return;
            
            isAnimating = true;
            const newTile = addRandomTile();
            animateBoard(oldBoard, board, mergedPositions, newTile);
            updateScore();
            
            setTimeout(() => {
                isAnimating = false;
                if (isGameOver()) showGameOver();
            }, 150);
        }
        
        function slideLeft(line) {
            let newLine = line.filter(x => x !== 0);
            let moved = false;
            let merged = [];
            
            for (let i = 0; i < newLine.length - 1; i++) {
                if (newLine[i] === newLine[i + 1]) {
                    newLine[i] *= 2;
                    score += newLine[i];
                    merged.push(i);
                    newLine.splice(i + 1, 1);
                }
            }
            while (newLine.length < gridSize) newLine.push(0);
            for (let i = 0; i < gridSize; i++) {
                if (line[i] !== newLine[i]) moved = true;
            }
            return {line: newLine, moved, merged};
        }
        
        function slideRight(line) {
            let newLine = line.filter(x => x !== 0);
            let moved = false;
            let merged = [];
            
            for (let i = newLine.length - 1; i > 0; i--) {
                if (newLine[i] === newLine[i - 1]) {
                    newLine[i] *= 2;
                    score += newLine[i];
                    merged.push(gridSize - 1 - (newLine.length - 1 - i));
                    newLine.splice(i - 1, 1);
                    i--;
                }
            }
            while (newLine.length < gridSize) newLine.unshift(0);
            for (let i = 0; i < gridSize; i++) {
                if (line[i] !== newLine[i]) moved = true;
            }
            return {line: newLine, moved, merged};
        }
        
        function animateBoard(oldBoard, newBoard, mergedPositions, newTile) {
            const container = document.getElementById('tileContainer');
            container.innerHTML = '';
            
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (newBoard[r][c] !== 0) {
                        const isMerged = mergedPositions.some(p => p.r === r && p.c === c);
                        const isNew = newTile && newTile.r === r && newTile.c === c;
                        const tile = createTileElement(r, c, newBoard[r][c], isNew, isMerged);
                        container.appendChild(tile);
                    }
                }
            }
        }
        
        function createTileElement(row, col, value, isNew = false, isMerged = false) {
            const tile = document.createElement('div');
            tile.className = `tile tile-${value <= 2048 ? value : 'super'}`;
            if (isNew) tile.classList.add('new');
            if (isMerged) tile.classList.add('merged');
            tile.textContent = value;
            tile.style.transform = `translate(${col * (cellSize + gap)}px, ${row * (cellSize + gap)}px)`;
            return tile;
        }
        
        function isGameOver() {
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const val = board[r][c];
                    if ((r < gridSize - 1 && board[r + 1][c] === val) ||
                        (c < gridSize - 1 && board[r][c + 1] === val)) {
                        return false;
                    }
                }
            }
            return true;
        }
        
        function showGameOver() {
            const overlay = document.getElementById('gameOver');
            const title = document.getElementById('gameOverTitle');
            const text = document.getElementById('gameOverText');
            
            let has2048 = false;
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] >= 2048) has2048 = true;
                }
            }
            
            title.textContent = has2048 ? '🎉 你赢了！' : '😔 游戏结束';
            text.textContent = `最终得分: ${score}`;
            overlay.classList.add('show');
        }
        
        init();
    </script>
</body>
</html>
